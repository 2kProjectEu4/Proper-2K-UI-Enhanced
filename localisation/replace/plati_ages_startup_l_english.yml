l_english:

# Age of Discovery
 ab_allow_feudal_de_jure_law: "Feudal de jure Law\n\n§WThe classic version of feudalism was a mish-mash of reciprocal legal and military obligations among a warrior nobility, revolving around the concepts of lords, vassals and fiefs. (There were, of course, peasants tied to the land, but lords and vassals didn’t concern themselves with such much.) Power and wealth passed about between the favored few as if in a vast game; the rules were complex, often mysterious, in which the Catholic Pope had special privileges and powers as God’s representative on Earth. Not only did aristocrats partake of feudalism, but so too did bishops and abbots (bishops at times could be found on the battlefields, hacking away with the best of secular lords).\n--------------§!"
 ab_justified_wars: "Justified Wars \n\n§WThe just war theory by Thomas Aquinas has had a lasting impact on later generations of thinkers and was part of an emerging consensus in Medieval Europe on just war. In the 13th century Aquinas reflected in detail on peace and war. Aquinas was a Dominican friar and contemplated the teachings of the Bible on peace and war in combination with ideas from Aristotle, Plato, Saint Augustine and other philosophers whose writings are part of the Western canon. The Just War theory, with some amendments, is still used by Christians today as a guide to whether or not a war can be justified. War may be necessary and right, even though it may not be good. In the case of a country that has been invaded by an occupying force, war may be the only way to restore justice.\n--------------§!"
 ab_transfer_vassal_wargoal: "Feudal Contract \n\n§WFor commoners not serfs nor indentured servants, villeins – not to be confused with “villains,” although that may be mere terminology – were the vassals enjoying a feudal contract with a manor lord. They were legally free but subject to the lord’s authority. Under the feudal contract, the lord had the duty to provide a fief for his villein, to protect him, and to provide justice in the king’s court for him. In return, the lord demanded fealty and the right to services attached to the contract (military, labor, taxes, and such). To violate the oath of fealty was a felony, like a breach of contract but with stiffer penalties.\n--------------§!"
 ab_free_war_taxes: "Improved Wartaxes \n\n§WA professional army is a full-time military organization that remains in being even when the country is at peace. Its soldiers are paid for their services by the state and spend their time training or performing public works when not at war. The earliest armies were not professional. When war was imminent, the country's leaders would issue a call and all able-bodied men would shoulder their weapons and march off to battle. These amateur soldiers usually didn't have much training and were often expected to supply their own weapons and armor, so their quality was not very high. They tended to desert when they had to tend to their crops, so battles were scheduled for the summer. If victory wasn't achieved by harvest, the war would often be called off for a year.\n--------------§!"
 ab_cavalry_armies: "Chivalry \n\n§WBefore it was reshaped by Christianity, our romantic notions of chivalry were introduced to Europe by the Moors of Iberia through their tales of knightly adventure for the sake of glory and love; once 'The One Thousand and One Nights' was translated into French in the 12th Century, there was no putting the genie back in the bottle. More often idealized than practiced, Charlemagne’s chevalerie (“horse soldiery”) believed chivalry to include a code of conduct that elevated loyalty, honor, forbearance, hardihood and largess above all other knightly qualities (like trampling the godless). All those things that nutcase Don Quixote was raving about.\n--------------§!"
 ab_colony_boost_development: "Colonial Offices \n\n§WOnce national governments began taking a hand in (and taking over) overseas colonies founded by trading companies, military adventurers, and religious fanatics, the ad hoc administrations of such distant outposts needed a firmer hand. Thus, the Spanish formed colonial offices, and were soon emulated by the other colonial powers. In the late-1500s AD the Spanish monarchy formed the Council of the Indies (although it didn’t assume its final form until a century had passed), a hierarchical organization to rule over the colonies since the king couldn’t be bothered. Initially two viceroyalties were established (two others later); Spanish viceroys had judicial and legislative control of their territory, and – more importantly – had direct access to the colonial treasury.\n--------------§!"
 ab_attack_bonus_in_capital_terrain: "Adaptative Combat Terrain \n\n§WOnce warfare moved past the stage of small masses of men just having at it in a club-thumping melee, maneuvers gave the more nimble warriors a distinct advantage in battle. The concept of using rapid movements to keep the enemy at a disadvantage is almost as old as the idea of war itself. Tactical maneuvers are intended to be used on the battlefield, while “maneuver warfare” covers all that leads up to forcing an enemy to fight at a place or time they’d rather not. Both types came to prominence with the advent of chariots and cavalry … and their importance hasn’t diminished since.\n--------------§!"
 ab_ottoman_siege_ability: "Great Bombards \n\n§WGreat bombards were a set of medieval cannons that were cast of bronze or iron and fired stone projectiles weighing hundreds of pounds. The greatest of these was a cannon called 'Basilica' that pounded the walls of Constantinople. It was over 25 feet long, used hundreds of pounds of powder that, with a projectile weighing in excess of 1,200 pounds, took hours to load. The bombard was so huge that it had to be constructed in two pieces that screwed together to make it, presumably, easier to move. This meant it only took 60 oxen and hundreds of men over 40 days to move the bombard the 120 miles between Adrianople and Constantinople at an achingly slow two miles a day!\n--------------§!"
 ab_portugal_colonial_growth: "Portuguese Colonial Growth \n\n§WPortugal went from being a small medieval kingdom on the Atlantic coast of the Iberian peninsula to a massive maritime empire. At its height in the 1500s, Portugal controlled parts of South America, Africa, Asia, and Oceania. As one of the first European countries to take up colonial ventures, Portugal is responsible for the first great wave of globalization: the movement of people, ideas, and spices around the world to an extent never seen before.\n--------------§!"
 ab_denmark_reduced_lib_desire: "Kalmar Union \n\n§WThe union was the work of Scandinavian aristocracy wishing to counter the influence of the Hanseatic League, a northern German trade league centered around the Baltic and North Seas. One of the last structures of the Union remained until 1536/1537 when the Danish Privy Council, in the aftermath of the Count's Feud, unilaterally declared Norway to be a Danish province. This did not happen. Instead, Norway became a hereditary kingdom in a real union with Denmark.\n--------------§!"
 ab_venice_ship_trade: "Venetian Trade \n\n§WThe merchants operating out of Venice in the 13th through 16th centuries were more than just traders; they were explorers, diplomats, geographers and authors. Besides bringing wealth to the Venetian Republic, they brought back knowledge and culture, and set them down in writing. The exploits of individuals such as Marco Polo, Gasparo Balbi and Ambrogio Contarini not only made Venice rich, but famous as well.\n--------------§!"

# Age of Reformation
 ab_allow_religion_enforced: "Religion Enforced Edict \n\n§W Initiated to address the effects of the Protestant Reformation, the Counter-Reformation was a comprehensive effort composed of apologetic and polemical documents and ecclesiastical configuration as decreed by the Council of Trent. The last of these included the efforts of Imperial Diets of the Holy Roman Empire, heresy trials and the Inquisition, anti-corruption efforts, spiritual movements, and the founding of new religious orders. Such policies had long-lasting effects in European history with exiles of Protestants continuing until the 1781 Patent of Toleration, although smaller expulsions took place in the 19th century.\n--------------§!"
 ab_siege_blockades: "Floating Batteries \n\n§WUse of timber rafts loaded with cannon by Danish defenders of Copenhagen against bomb ketches of a combined British-Dutch-Swedish fleet is attested by Nathaniel Uring in 1700. An early appearance was in 1782 at the Great Siege of Gibraltar, and its invention and usage is attributed to French engineer Jean Le Michaud d'Arçon.\n--------------§!"
 ab_warscore_vs_religion: "Religious Wars \n\n§WOne thing is guaranteed about the faithful: their willingness to kill (or die) for their beliefs. Since the ancient Mesopotamian city-states began bashing each other, religion has been the cause of many a “holy” war – the Israelite conquest of the Canaan city-states, Muslim expansion, and the subsequent Crusades. But none matched the wars of religion that were set off when Luther nailed up his 95 theses. For much of the 16th and 17th centuries, the Protestants and Catholics went at each other with abandon, devastating most of Central Europe and causing astronomical casualties – an estimated 11.5 million in the Thirty Years' War and another four million in the French Wars of Religion alone.\n--------------§!"
 ab_mercenary_discipline: "Mercenary Discipline \n\n§WMercenaries - those who take part in a conflict for personal gain or compensation rather than duty or belief - have been a fact of war since ancient times; but the practice reached its height during the Renaissance, when the so-called "Free Companies" were formed to fight for hire. Often composed of veterans from national armies and led by a charismatic commander such as the Englishman Sir John Hawkwood, who formed the infamous White Company, these were usually hired during times of war by city-states or small kingdoms that lacked the funds or manpower to maintain standing armies. While some of the early mercenary forces specialized in specific forms of combat - for instance, cavalry or artillery companies - most were formed of German or Swiss landsknecht and saw extensive use during the religious wars of the Reformation. Coincidentally, to the south the condottieri served in the internecine wars between the Italian city-states, including the Papacy. As late as the 1700s Scots-Gaelic Gallowglass companies were available for hire to continental nobles. In modern times, mercenaries tend to be hired in small, elite teams for specific missions, or be part of private security companies.\n--------------§!"
 ab_ship_power_propagation: "Powerful Tradeships \n\n§WAt various times, nations transporting large amounts of treasure and trade goods have resorted to convoys of transports to improve the chances that the cargo would actually arrive at its destination. The most famous was the annual Spanish treasure fleet that brought gold, silver, spices, tobacco, pearls and other riches from the West Indies to Spanish ports in Europe from 1566 to 1790 AD. The sack of Spanish Havana by French privateers and attacks on lone galleons by English buccaneers moved the Spanish to institute the convoys between the New World and Europe. Although the seas are relatively safe from pirates now, during wartime maritime nations still organize convoys to improve the chances of merchant ships arriving intact.\n--------------§!"
 ab_institution_spread_from_true_faith: "Institutional Spread \n\n§WThe printing press, when invented by Johann Gutenberg in the 1400s, had an immense impact on the world as it existed then. It revolutionized the society of the time, bolstered social movements such as the Renaissance, and became one of the pioneering points in the scientific revolution. A huge impact was also felt on the religious discourse at the time, from strengthening the authority of the Church to laying the groundwork for the Protestant Movement. Soon the ranks of the protesters (unimaginably termed “Protestants”) grew as Lutheranism spread through the Germanies, Reformed churches formed in Switzerland and the Netherlands, Presbyterian congregations grew in Scotland, and Henry VII created the Anglican Church in England so he could satisfy his cravings for Anne Boleyn.\n--------------§!"
 ab_prestige_per_development_from_conversion: "Prestigious Conversions \n\n§WAccording to the Catholic Church, missions are religious communities devoted to teaching, tending, and helping the local populace, thus supporting Christ’s ideals. Of course, the Spanish, Portuguese and French missions were also devoted to converting the locals and then “civilizing” them through cultural assimilation. The Spanish missions serve as the traditional template, self-supporting enclaves with churches, dormitories, fields and pastures, gardens, barns, workrooms, hospitals and schools. In places these were even fortified, ready to defend themselves from opposition. Most of the missions in the Americas, Asia, and Africa were administered by religious orders such as the Franciscans, Jesuits, Dominicans, and Augustinians rather than the Church itself, but the effects were the same. Nonetheless, the missions often served as a nucleus around which European colonizing efforts could coalesce.\n--------------§!"
 #ab_spain_tercio: "Spanish Tercios \n\n§WThe Tercio is a brilliant military innovation consisting of a mixed formation of pikemen and arquebusiers (soldiers armed with extremely primitive firearms), created in the early 16th century by the Spanish general Gonzalo Fernández de Córdoba. The tercio (also known as the “Spanish square”) was deployed in a checkerboard formation, with pikemen and arquebusiers set in alternating supporting blocks. The advantages of this arrangement are obvious: the arquebusiers can attack the enemy at distance, and the pikemen can take over in close combat. This formation would come to dominate Renaissance warfare for more than a century.\n--------------§!"
 ab_spain_shock_tactics: "Spanish Field Marshals \n\n§WThe Spanish military employed the rank of Maestre de campo, equivalent to a field marshal, to command its renowned Tercios infantry units. Established in 1534 by Emperor Charles I, the Maestre de campo was second only to the captain general and was responsible for overseeing battlefield tactics, troop movements, discipline, and logistics. Notable figures who held this rank include Julián Romero, celebrated for his leadership in the Italian Wars and the Dutch Revolt; Francisco Verdugo, who served as governor and captain-general of Friesland and Groningen during the Dutch Revolt; and Juan del Águila, known for commanding Spanish forces in Brittany and Ireland. These commanders played pivotal roles in Spain's military campaigns, contributing significantly to its dominance during the era.​\n--------------§!"
 ab_mughal_artillery: "Mughal Artillery \n\n§WThe Mughal military employed a broad array of gunpowder weapons larger than personal firearms, from rockets and mobile guns to an enormous cannon, over 14 feet long, once described as the "largest piece of ordnance in the world." Extremely heavy artillery was an important part of the Mughal military, especially under its early emperors. Babur deployed guns capable of firing cannonballs weighing between 225 and 315 pounds against a 1527 siege, and had previously employed a cannon capable of firing a 540-pound stone ball. Humayun did not field such massive artillery at the Battle of Kannauj in 1540, but still had heavy cannons, capable of firing 46 pound lead balls at a distance of one farsakh. These large weapons were often given heroic names, such as Tiger Mouth (Sher Dahan), Lord Champion (Ghazi Khan), or Conqueror of the Army (Fath-i-Lashkar), and inscriptions, sometimes in verse. They were not only weapons, but "real works of art".\n--------------§!"
 ab_polish_legitimacy: "Polish Crown \n\n§WSpurred by nationalism, democratic precepts, and concerns about foreign threats, in June 1569 the Sejm passed an act establishing the Polish-Lithuanian Commonwealth, a unified federal state with an elected monarch but which was governed primarily by the nobility through local assemblies and a central parliament. In July, the childless Sigismund II, last of Jagiellon dynasty, accepted and signed the act. Although the commonwealth is credited with instituting a period of stability and prosperity and the spread of Western culture to areas such as the Ukraine and western Russia, it found itself repeatedly embroiled in conflicts with Russia, Sweden, the Ottomans, and Cossack uprisings. The toll of these wars, notably Poland-Lithuania's involvement in the Great Northern War (1700-1721 AD), coupled with a succession of weak elected kings, left the nation desperately in need of internal political reform. During the middle years of the 18th Century, the Sejm moved to implement commercial, military, social and educational reforms, which included the Commission of National Education in 1773, the first state-sponsored education system in Europe.\n--------------§!"
 #ab_persia_reinforce: "Jazayerchi \n\n§WWhereas the Safavids were a Shi’ia exclusive group, under Nader Shah, Iran became multi-religious and more tolerant. It was a selling point to the Sunni Ottomans with whom, after they fought to a stalemate, Nader Shah sought closer ties. This tolerance in terms of religion is in part owing to his own background – as a former slave and present-day military commander, he cared little for religion and, in his own life, moved between Sunni and Shi’ia as was convenient. Better to invest in the army than in priests, as the former would secure peace. Elsewhere in the empire, Nader Shah created a standardized coinage pegged to the Mughal rupee and resettled nomadic tribes in the area.\n--------------§!"
 ab_persia_development: "Persian Enlightenment \n\n§WPersia experienced significant cultural and intellectual developments, particularly during the Safavid dynasty's rule. Philosophically, the School of Isfahan emerged as a prominent center of Islamic thought. Founded by Mir Damad and reaching its zenith with Mulla Sadra, this school integrated various strands of Islamic philosophy, emphasizing the relationship between philosophy and mysticism. Mulla Sadra's work, especially his concept of the "four journeys" of the soul, had a lasting impact on Islamic philosophy. ​In the realm of arts, the Safavid era witnessed a flourishing of Persian art and culture. The establishment of the royal library-workshop, or ketab khaneh, under Safavid patronage, became a hub for the production of illuminated manuscripts and miniature paintings. Artists like Riza-yi 'Abbasi introduced new subjects and styles, reflecting the dynamic cultural landscape of the time.\n--------------§!"

# Age of Absolutism
 ab_allow_edict_of_absolutism: "Edict of Absolutism \n\n§WJames VI of Scotland penned the Basilikon Doron, a manual on the power of kings, in preparation for his ascension to the English throne, stating, “The state of monarchy is the supremest thing upon Earth, for kings are not only God’s lieutenants upon earth and sit upon God’s throne.” But by the 18th Century, rulers began to consolidate power in more secular ways, tending towards absolutism. The spread of Protestantism hurried things along, as the Catholic sanction of divine right came into question. The American and French revolutions, and Napoleon’s tossing all kinds of kings aside, deprived the doctrine of its last shreds of credibility.\n--------------§!"
 ab_rival_change: "Flexible Rivalries \n\n§WWhile Spain had been the dominant world power in the sixteenth and early seventeenth centuries, the English had often sided with France as a counterweight against them. This design was intended to keep a European balance of power, and prevent one country gaining overwhelming supremacy. France replaced Spain as the dominant power after 1650 so the basis of English strategy was the fear that a French universal monarchy of Europe would be able to overwhelm the British Isles.\n\nFollowing the conclusion of the Thirty Years' War (1618–1648) Treaty of Westphalia in 1648, and as France finally overcame its rebellious "princes of the blood" and Protestant Huguenots, the long fought wars of the Fronde (civil wars) finally came to an end. At the same time Spain's power was severely weakened by decades of wars and rebellions – and France, began to take on a more assertive role under King Louis XIV of France with an expansionist policy both in Europe and across the globe. English foreign policy was now directed towards preventing France gaining supremacy on the continent and creating a universal monarchy. To the French, England was an isolated and piratical nation heavily reliant on naval power, and particularly privateers, which they referred to as Perfidious Albion. Wars were fought intermittently, with each nation part of a constantly shifting pattern of alliances known as the stately quadrille.\n--------------§!"
 ab_rival_border_fort: "Protecting Forts \n\n§WMarquis de Vauban is generally considered the greatest engineer of his time, and one of the most important in European military history. His principles for fortifications were widely used for nearly 100 years, while aspects of his offensive tactics remained in use until the mid-twentieth century. He viewed civilian infrastructure as closely connected to military effectiveness and worked on many of France's major ports, as well as projects like the Canal de la Bruche, which remain in use today. He founded the Corps royal des ingénieurs militaires, whose curriculum was based on his publications on engineering design, strategy and training.\n--------------§!"
 ab_autonomy: "Efficient Autonomy \n\n§WVarious regions adopted forms of efficient autonomy to manage diverse populations and improve governance. The Polish–Lithuanian Commonwealth’s 'Golden Liberty' system allowed nobles to elect kings and maintain regional self-rule, promoting religious tolerance. In Italy, rulers centralized courts to unify legal authority, increasing administrative efficiency. Sweden’s Freedom of the Press Act of 1766 enhanced transparency, though later reversed by a royal coup. Meanwhile, the Ottoman Empire’s Millet system granted religious minorities autonomy in law, education, and taxation.\n--------------§!"
 ab_harsh_treatment: "Harsher Treatment \n\n§WOprichniks were the police and soldiers of Oprichnina, a royal domain created by Ivan the Terrible. Tsar Ivan used his Oprichniks to crush any hereditary opposition to his rule. These soldiers carried out their Tsar's will with unflinching loyalty and were brutal and ferocious thugs. The Tsar's goals were not especially original, but Ivan the Terrible and his Oprichniks operated on an unprecedented scale. One attack on the city of Novgorod took the lives of at least 3,000 people. They were slaughtered over the course of a week. Some accounts put the death toll as high as 60,000 people. The Oprichniks promoted a fierce appearance, wearing all black uniforms and riding black horses. The Oprichnik seal bore a dog, symbolizing their loyalty to the Tsar and their tenacity in fighting for the Tsar, and a broom, to represent sweeping away the Tsar's enemies.\n--------------§!"
 ab_adm_efficiency: "Administrative Efficiency \n\n§WAbsolute monarchies work as well as the monarch and the bureaucracy built around him or her, provided the ruler is as gifted as Elizabeth I, Frederick the Great or Qin Shi Huang. Otherwise, the nation tends to slip in stagnation. And for the truly inept, revolution looms.\n--------------§!"
 ab_yearly_absolutism: "Absolute Government	 \n\n§WAn absolute monarchy is one in which there are no restraints on the wielding of power (think the German Kaiser), whereas in a constitutional monarchy (think the British queen), the ruler’s power is somewhat constrained by law … no “off with his head” without a trial, for instance. In an electoral monarchy, the ruler is elected, usually by some form of special convocation (such as that for the Holy Roman Empire).\n--------------§!"
 #ab_france_fire_damage: "French Crown \n\n§WLouis XIV's France was emblematic of the Age of Absolutism in Europe and he became one of the most powerful French monarchs and consolidated a system of absolute monarchy in France that endured until the French Revolution. He encouraged leading nobles to live at Versailles. This, along with the prohibition of private armies, prevented them from passing time on their own estates and in their regional power bases, from which they historically waged local wars and plotted resistance to royal authority. Louis thus compelled and seduced the old military aristocracy (the "nobility of the sword") into becoming his ceremonial courtiers, further weakening their power. Louis greatly emphasized etiquettes in ballet dancing, evidently seen in "La belle danse" (the French noble style). More challenging skills were required to perform this dance with movements very much resembling court behaviours, as a way to remind the nobles of the king's absolute power and their own status.\n--------------§!"
 ab_french_absolutism: "French Absolutism \n\n§W​Epitomized by the reign of Louis XIV from 1643 to 1715, French absolutism was a political system where the monarch held centralized and unrestricted authority over the state. Louis XIV, known as the 'Sun King', famously declared, 'L'état, c'est moi' ('I am the state'), reflecting his belief in the divine right of kings and his role as the embodiment of France. He centralized power by compelling the nobility to reside at the opulent Palace of Versailles, thereby diminishing their influence and consolidating his control. This era was marked by significant cultural patronage and military expansion, elevating France's prominence in Europe. However, the concentration of power also led to social and economic strains, contributing to future unrest. \n--------------§!"
 #ab_dutch_anti_corruption: "Dutch Officials \n\n§WSince the late Middle Ages Dutch cities had been run by the richer merchant families. Although not formally a hereditary "class", they were de facto "patricians", comparable in some sense to that ancient Roman class. At first the lower-class citizens in the guilds and schutterijen could unite to form a certain counterbalance to the regenten, but in the course of the 16th, 17th and 18th century the administration of the cities and towns became oligarchical in character, and it became harder and harder to enter their caste. From the latter part of the 17th century the regent families were able to reserve government offices to themselves via quasi-formal contractual arrangements. Most offices were filled by co-option for life. Thus the regent class tended to perpetuate itself into a closed class. However, in practice they had to take into account the opinions of the man on the street (de gemeente Dutch), moreso than in the monarchies of the time, otherwise they ran the risk of being dislodged by political upheavals, like the Orangist revolutions of 1672 and 1747 and the Patriot revolt of 1785. It was, by the standards of the time, a country where men lived safely under the laws.\n--------------§!"
 ab_dutch_trade: "Dutch Commercialization \n\n§WThe Dutch Republic emerged as a global economic powerhouse, initiating an era known as the Dutch Golden Age. This prosperity was driven by strategic maritime trade, notably the Baltic 'Mothertrade', which supplied essential commodities like grain and timber. The establishment of the Dutch East India Company (VOC) in 1602 and the Dutch West India Company (WIC) in 1621 further expanded Dutch influence, facilitating trade in spices, sugar, and slaves across Asia, Africa, and the Americas. Amsterdam became a central hub for finance and commerce, exemplified by the founding of the Amsterdam Stock Exchange and the Bank of Amsterdam in 1609. However, by the 18th century, the Dutch economy faced challenges due to increased competition from England and France, leading to a decline in dominance despite continued involvement in global trade. \n--------------§!"
 ab_sweden_manpower: "Swedish Recruitment \n\n§WThe Swedish military had a unique position in Northern Europe at the time of the allotment system, being the only army that did not rely only on enlisted soldiers, mercenaries or conscripted soldiers. In relation to population size, the Swedish army was also the largest in Europe. Because of the allotment system, mobilisation was quick. It took time, weeks and months, to enlist, equip, train and organize a unit of mercenaries, while the Swedish croft soldiers gathered at the company meeting place in a couple of days, and then at the regimental meeting place in around a week. The soldiers were already trained and equipped, and knew their precise spot in the formation. Marching routes to the borders or to harbours had already been prepared, and supplies had been gathered at important places.\n--------------§!"
 ab_manchu_banner: "Manchu Banners \n\n§WIn the early seventeenth century, the Manchu emperor Nurhaci established the Eight Banners - administrative groups into which all families were placed, often based on lineage and tribal connections. These groups were broken down further into companies. Nurhaci wished to create a citizenry that could be called upon to wage war on enemies of the Manchu, as each company was required to furnish a number of soldiers, often 300, that together would form a larger regional banner army.\n\nLater, when Nurhaci’s successors conquered the Mongols and the Han Chinese in the mid-seventeenth century, they incorporated these new warriors into the banner army system. During its height, the Eight Banners system included ethnic Manchu, Han Chinese, and Mongol soldiers. Although it began as a foreign military system forced upon the conquered, the system quickly evolved into the core administrative philosophy behind many government practices, such as the disbursement of salaries, distribution of land, management of property, and oversight of popular welfare and justice matters.\n--------------§!"

# Age of Revolution
 ab_allow_anti_revolutionary_zeal: "Anti-Revolutionary Zeal	\n\n§WDuring the French Revolution, conservative forces (especially within the Catholic Church) organized opposition to the progressive sociopolitical and economic changes brought by the Revolution; and so Conservatives fought to restore the temporal authority of the Church and Crown. In 19th Century European politics, the reactionary class included the Catholic Church's hierarchy and the aristocracy, royal families, and royalists who believed that national government was the sole domain of the Church and the State. In France, supporters of traditional rule by direct heirs of the House of Bourbon dynasty were labeled the legitimist reaction. In the Third Republic, the monarchists were the reactionary faction, later renamed Conservative. Despite forceful and often violent efforts of established and reactionary powers to keep them down, disruptive ideas gained popularity: democracy, liberalism, radicalism, nationalism, and socialism.\n--------------§!"
 ab_napoleonic_warfare: "Napoleonic Warfare \n\n§WNapoleonic tactics describe certain battlefield principles used by national armies from the late 18th century until the invention and adoption of the rifled musket in the mid 19th century. Napoleonic tactics are characterized by intense drilling of the soldiers; speedy battlefield movement; combined arms assaults between infantry, cavalry, and artillery; and a relatively small numbers of cannon, short-range musket fire, and bayonet charges. Napoleon I is considered by military historians to have been a master of this particular form of warfare. Napoleonic tactics continued to be used after they had become technologically impractical, leading to large-scale slaughters during the American Civil War, Austro-Prussian War and the Franco-Prussian War.§!\n"
 ab_force_march: "Improved Force March \n\n§WA movement on foot by soldiers or prisoners of war, who must, in order to satisfy a military requirement, travel at a speed or in adverse conditions that would normally tire them excessively. In many countries, the ability to complete loaded marches became a core military skill, especially for infantry.\n--------------§!"
 ab_more_ships_can_fire: "Battleships \n\n§WDuring the 17th-19th centuries, naval tactics evolved towards a heavy reliance on broadside bombardments. This led warship construction to favor larger vessels with more cannons and greater integrity. The pinnacle of this development was the ship of the line, so named for the "line", a broadside tactic. These early battleships ruled the seas in their heyday, but were gradually superseded by ironclad frigates during the later part of the 19th century.\n--------------§!"
 ab_no_distance_for_core: "Unrestricted Conquest \n\n§WDuring the Revolutionary and Napoleonic eras (1789–1815), France conquered most of western Europe and established several client states. A total of 35 German states, all of them allies of France, seceded from the Holy Roman Empire to create the Confederation of the Rhine, a client state created to provide a buffer between France and its two largest enemies to the east, Prussia and Austria. Two of those states were Napoleonic creations: the huge Kingdom of Westphalia, which was controlled by Jerome Bonaparte, the Emperor's youngest brother; and the Grand Duchy of Würzburg. Following the French invasion of the Iberian Peninsula, Spain too was turned into a client Kingdom of Spain under Joseph Bonaparte; as was Poland, then the Duchy of Warsaw.\n--------------§!"
 ab_backrow_artillery: "Improved Artillery Range \n\n§WThe 12-pounder Napoleon gun was named for the emperor of France, where it was developed in 1853. It quickly gained traction in the United States, where its power, versatility, and mobility were immediately noticed and used to dreadful effect; 12-pounders were some of the deadliest killing machines of the American Civil War. By the late 19th century it had superseded most field guns as the dominant model.§!\n"
 ab_same_contine_lib_desire: "Loyal Subjects \n\n§WWith emergence of a “public sphere” and an integrated national economy in various 18th-Century European civilizations, people began to identify with their country at large rather than the smaller town or province in which they resided. National symbols, anthems, flags, myths, and traditions were elevated in the citizenry’s collective psyche as being somehow important. The convulsions of the American and French revolutions augmented this development with widespread appeals to patriotic nationalism. Prussian-born Johann Herder was the prophet of this new creed and originated the term “nationalism” to describe an inborn pride in one’s origins, language, and culture. Then came the many wars of nationalism, and a new level was added to the chauvinism.\n--------------§!"
 ab_pru_military: "Prussian Discipline \n\n§WWhen Frederick William I ascended the throne he found Prussia highly indebted, and he made order, diligence, modesty and the fear of God the guiding principles for his successful reform and reorganization of the state. He saw himself as a moral role model for his subjects. Frederick the Great, unlike his father, was an aesthete who admired Voltaire and the French Enlightenment, and was not inclined toward Pietism. He nevertheless felt himself bound to many of his father's ideals and deviated only slightly from Frederick William's self-image as the "first sergeant to the King of Prussia", saying that he wished to be the "first servant of his state". He regarded the Enlightenment ideals of reason and tolerance as personal maxims of conduct in his governance of Prussia.\n\nPrussian virtues originally applied just to the army and were adopted only later by a Prussian society that was increasingly oriented around the military. A strict hierarchy was characteristic of the Prussian social system, with the result that characteristics to be striven for included loyalty, a self-denial that benefits the state and the king (the Prussian soldier's oath of allegiance included the line, "He who swears by the Prussian flag no longer has anything that belongs to himself"), bravery without self-pity ("Learn to suffer without complaining"), subordination, courage, and obedience (but not without openness. (Self-)discipline, an indispensable military virtue, involved toughness (Härte) towards oneself even more than towards others.\n--------------§!"
 ab_gbr_fleet: "British Fleet \n\n§WShips of the line are the largest and most powerful sailing vessels ever built. They formed the backbone of Europe's great navies from the 17th to the mid 19th centuries. Ships of the line were named for the classic formation that these ships fought in. In battle, each side's ships would approach the enemy in a line, and as the opposing ships passed, each would let off a thundering broadside of cannon fire, doing horrific damage to the vessels and to those aboard her. Victory usually went to the side with the most cannon and the best-trained sailors. The English were masters at this form of warfare, and their ships of the line dominated the world's oceans for more than a century.\n--------------§!"
 ab_russia_boost: "Russian Empire \n\n§WCatherine the Great ruled Russia during the latter half of the 18th century. She oversaw a great expansion of the Russian empire, adding tens of thousands of square miles of territory through conquest and shrewd diplomacy. A beautiful and intelligent woman, she beguiled and seduced the best minds of Europe, making her court one of the centers of Enlightenment thinking on the Continent. Although born in Germany, Catherine is one of the greatest rulers in Russian history. As Empress, Catherine pursued an expansionist policy backed by military muscle. The "First Russo-Turkish War" (1768-1774), declared by Sultan Mustafa III after a border incident in which a Cossack entered Ottoman territory and allegedly slaughtered the residents of Balta, was a resounding Russian success, gaining for Catherine the Southern Ukraine, Northern Caucasus and the Crimea, expanding Russian access to the Black Sea. The Ottomans tried to take their territory back in the Second Russo-Turkish war, but they failed miserably.\n\nDuring her reign Catherine undertook a wide range of political reforms, attempting to shape up the notoriously corrupt and incompetent Russian bureaucracy. She tried to model her government and court on Versailles, France. She paid for her reforms by seizing property from the clergy, who owned almost one-third of the land and serfs in Russia. She curried favor with the aristocracy, expanding their already-great power over the Russian peasants.\n--------------§!"
 #ab_austria_rep: "Austrian Tenacity \n\n§WDuring the 18th century, the Holy Roman Empire and the powerful Habsburg Monarchy of Austria were led by the ever-persistent Maria Theresa, who defied the European powers opposed to her reign and bravely served the subjects of her kingdom. In nearly 650 years of Habsburg rule, Maria Theresa was the first and only female to ever lead the empire, and she proved to be among the most successful rulers in their history. Although she inherited the throne during a tumultuous period, with little personal experience in governing, she managed to secure her crown and assertively rule the Habsburg monarchy for 40 years.\n--------------§!"
 ab_austrian_morale: "Austrian Tenacity \n\n§W​The Austrian Empire faced numerous military challenges, yet its forces often displayed remarkable resilience and morale. A significant factor was the deep-rooted military culture that permeated Austrian society, fostering a strong sense of duty and loyalty among soldiers. This culture was reinforced by local recruitment practices, which cultivated regional identities and camaraderie within units. For example, during the Napoleonic Wars, the army emphasized strict principles of honor, promoting values like obedience, discipline, and courage, which bolstered soldiers' commitment to the Habsburg dynasty.\n--------------§!"
